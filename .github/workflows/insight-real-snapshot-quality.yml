name: Insight Real Snapshot Quality

on:
  workflow_dispatch:
  schedule:
    - cron: "41 2,14 * * *"
  push:
    branches:
      - main
    paths:
      - "src/insight/**"
      - "src/pages/InsightPage.jsx"
      - "public/newsdata/insight_latest.json"
      - "scripts/**insight**"
      - "package.json"
      - ".github/workflows/insight-real-snapshot-quality.yml"

permissions:
  contents: read
  actions: read

concurrency:
  group: insight-real-snapshot-quality
  cancel-in-progress: false

jobs:
  strict-real-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Source diversity guard certification
        run: npm run test:insight-source-diversity-guard

      - name: Real snapshot ratchet certification
        run: npm run test:insight-real-snapshot-ratchet

      - name: Run strict real snapshot quality benchmark
        run: npm run test:real-insight-snapshot-quality:strict

      - name: Verify generated report
        if: always()
        run: |
          if [ -f public/newsdata/real_insight_quality_report.json ]; then
            node scripts/verify_real_insight_quality_report.mjs
          else
            echo "No real_insight_quality_report.json generated."
          fi

      - name: Upload Insight quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: insight-real-snapshot-quality-report
          if-no-files-found: ignore
          path: |
            public/newsdata/real_insight_quality_report.json
            public/newsdata/real_insight_quality_summary.md
