name: Daily News Brief

on:
  schedule:
    # Runs at 01:00, 07:00, 13:00 UTC (6:30 AM, 12:30 PM, 6:30 PM IST)
    - cron: '0 1,7,13 * * *'
  workflow_dispatch:

concurrency:
  group: daily-news-brief
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('punkt_tab', quiet=True)" || true

      - name: Run Aggregation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/daily_brief.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/epaper_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: daily brief $(date -u +'%Y-%m-%dT%H:%MZ')"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push && exit 0
            sleep $((2 ** i))
          done
          exit 1

      - name: Open issue on workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `daily_brief failure: ${new Date().toISOString()}`;
            const body = [
              'Automated alert from `daily_brief.yml`.',
              '',
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Ref: ${context.ref}`,
              `- Commit: ${context.sha}`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation', 'daily-brief-failure']
            });
