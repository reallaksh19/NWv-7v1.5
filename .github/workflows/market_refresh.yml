name: Market Refresh

# Runs every 30 min during NSE trading hours:
# IST 9:00am–4:00pm Mon–Fri = UTC 3:30am–10:30am Mon–Fri
#
# Cron approximation: */30 3-10 * * 1-5
# Covers UTC 3:00–10:59, which is IST 8:30am–4:29pm.

on:
  schedule:
    - cron: '*/30 3-10 * * 1-5'   # every 30 min IST 9am–4pm weekdays
    - cron: '0 */4 * * 0,6'        # every 4 h on weekends (MF NAV, IPO calendar, market news)
  workflow_dispatch:

concurrency:
  group: market-refresh
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Node for market validation
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch rich market snapshot
        run: python scripts/market_snapshot_worker.py

      - name: Validate market snapshot
        continue-on-error: true
        run: npm run test:market-snapshot

      - name: Commit data
        id: commit_market
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/market_snapshot.json
          git add public/data/market_metrics.json
          git add public/data/source_health.json
          git add public/data/mutual_fund_snapshot.json
          git add public/data/fx_snapshot.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git commit -m "data: market refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push && echo "committed=true" >> "$GITHUB_OUTPUT" && exit 0
            sleep $((2 ** i))
          done
          exit 1

      # Publishing handled by deploy.yml — it fires on push to main.

      - name: Open issue on workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `market_refresh failure: ${new Date().toISOString()}`;
            const body = [
              'Automated alert from `market_refresh.yml`.',
              '',
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Ref: ${context.ref}`,
              `- Commit: ${context.sha}`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation', 'market-failure']
            });
