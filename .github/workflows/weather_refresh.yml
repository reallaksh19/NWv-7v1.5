name: Weather Refresh

# Runs every 4 hours so static weather fallback data remains inside the 48 h
# displayability guard even if one scheduled run fails.

on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

concurrency:
  group: weather-refresh
  cancel-in-progress: false

jobs:
  weather:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node for snapshot validation
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch weather snapshot
        run: python scripts/weather_snapshot_worker.py

      - name: Validate snapshot freshness
        run: npm run test:weather-snapshot-freshness

      - name: Commit data
        id: commit_weather
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/weather_snapshot.json
          if git diff --staged --quiet; then
            echo "No changes - skipping commit"
            exit 0
          fi
          git commit -m "data: weather refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push && echo "committed=true" >> "$GITHUB_OUTPUT" && exit 0
            sleep $((2 ** i))
          done
          exit 1

      - name: Open issue on workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `weather_refresh failure: ${new Date().toISOString()}`;
            const body = [
              'Automated alert from `weather_refresh.yml`.',
              '',
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Ref: ${context.ref}`,
              `- Commit: ${context.sha}`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation', 'weather-failure']
            });
